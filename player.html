<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Player Pro | GAMERADO TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background-color: #000; font-family: 'Poppins', sans-serif; overflow: hidden; color: #fff; }

        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Padrão */
            z-index: 1;
            transition: transform 0.3s ease;
        }

        /* Overlay de Brilho */
        .brightness-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            pointer-events: none;
            z-index: 2;
        }

        /* Interface de Controles */
        .controls-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            opacity: 1;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .controls-overlay.hidden { opacity: 0; pointer-events: none; }

        .top-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .back-btn, .lock-btn { background: none; border: none; color: #fff; font-size: 1.4rem; padding: 15px; cursor: pointer; }
        .video-title { font-size: 1rem; font-weight: 400; flex-grow: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Controles Centrais (Play/Skip) */
        .center-controls { display: flex; align-items: center; justify-content: center; gap: 50px; }
        
        .skip-wrapper {
            position: relative;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
        }

        .skip-wrapper i { font-size: 2.4rem; opacity: 0.9; }
        
        /* O segredo da centralização do "10" */
        .skip-num {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -42%); /* Ajuste fino para o centro do círculo */
            font-size: 0.7rem;
            font-weight: 700;
            pointer-events: none;
        }

        .play-pause-btn {
            width: 80px;
            height: 80px;
            background: none;
            border: none;
            color: #fff;
            font-size: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }

        /* Loading Spinner */
        .loader {
            position: absolute;
            width: 65px;
            height: 65px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #e50914;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Bottom Bar */
        .bottom-bar { display: flex; flex-direction: column; width: 100%; gap: 10px; }
        .progress-area { display: flex; align-items: center; gap: 15px; width: 100%; font-size: 0.8rem; }
        
        input[type="range"] {
            flex-grow: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #e50914;
            border-radius: 50%;
            cursor: pointer;
        }

        .bottom-btns { display: flex; justify-content: flex-end; align-items: center; gap: 20px; padding-bottom: 5px; }
        .bottom-btns button { background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; padding: 5px; }

        /* Cadeado */
        .locked-screen {
            position: absolute; inset: 0; z-index: 50; display: none;
            align-items: center; justify-content: center; background: transparent;
        }
        .locked-screen.active { display: flex; }
        .unlock-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 1px solid #fff; color: #fff; font-size: 1.5rem; }

        /* Gestos */
        .gesture-indicator {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px;
            display: none; align-items: center; gap: 10px; z-index: 100;
        }

        /* Menu de Opções */
        .menu-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 60; display: none; align-items: flex-end; justify-content: flex-end;
        }
        .menu-card {
            width: 300px; background: #1a1a1a; margin: 20px; border-radius: 15px;
            overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; cursor: pointer; }
        .menu-item:last-child { border: none; }
        .menu-item.selected { color: #e50914; font-weight: bold; }

    </style>
</head>
<body>

    <div class="player-container" id="mainContainer">
        <div class="brightness-overlay" id="bOverlay"></div>
        
        <video id="vPlayer" playsinline></video>

        <div class="gesture-indicator" id="gIndicator">
            <i class="fas fa-sun"></i>
            <span id="gText">50%</span>
        </div>

        <div class="controls-overlay" id="cOverlay">
            <div class="top-bar">
                <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
                <div class="video-title" id="vTitle">Aguardando início...</div>
                <button class="lock-btn" onclick="setLock(true)"><i class="fas fa-unlock"></i></button>
            </div>

            <div class="center-controls">
                <button class="skip-wrapper" onclick="seek(-10)">
                    <i class="fas fa-undo-alt"></i>
                    <span class="skip-num">10</span>
                </button>
                
                <div class="play-pause-btn" onclick="togglePlay()">
                    <div class="loader" id="vLoader"></div>
                    <i class="fas fa-play" id="playIcon"></i>
                </div>

                <button class="skip-wrapper" onclick="seek(10)">
                    <i class="fas fa-redo-alt"></i>
                    <span class="skip-num">10</span>
                </button>
            </div>

            <div class="bottom-bar">
                <div class="progress-area">
                    <span id="curTime">00:00</span>
                    <input type="range" id="pBar" value="0">
                    <span id="durTime">00:00</span>
                </div>
                <div class="bottom-btns">
                    <button onclick="changeZoom()"><i class="fas fa-expand" id="zIcon"></i></button>
                    <button onclick="toggleMenu(true)"><i class="fas fa-cog"></i></button>
                </div>
            </div>
        </div>

        <div class="locked-screen" id="lScreen" onclick="showUnlockBtn()">
            <button class="unlock-btn" id="uBtn" style="opacity:0" onclick="setLock(false)">
                <i class="fas fa-lock"></i>
            </button>
        </div>

        <div class="menu-overlay" id="mOverlay" onclick="toggleMenu(false)">
            <div class="menu-card" onclick="event.stopPropagation()">
                <div style="padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #333;">Velocidade</div>
                <div class="menu-item" onclick="setSpeed(0.5, this)">0.5x</div>
                <div class="menu-item" onclick="setSpeed(1.0, this)">Normal</div>
                <div class="menu-item" onclick="setSpeed(1.5, this)">1.5x</div>
                <div class="menu-item selected" onclick="setSpeed(2.0, this)">2.0x</div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('vPlayer');
        const container = document.getElementById('mainContainer');
        const controls = document.getElementById('cOverlay');
        const playIcon = document.getElementById('playIcon');
        const loader = document.getElementById('vLoader');
        const progressBar = document.getElementById('pBar');
        
        let hideTimeout;
        let isLocked = false;
        let zoomLevel = 0; // 0: Contain, 1: Cover, 2: Zoom

        // 1. INICIALIZAÇÃO AGRESSIVA (Ao primeiro toque)
        document.body.addEventListener('click', async function init() {
            // Tenta Play
            video.play().catch(() => {});
            
            // Tenta Fullscreen
            try {
                if (container.requestFullscreen) await container.requestFullscreen();
                else if (container.webkitRequestFullscreen) await container.webkitRequestFullscreen();
                
                // Tenta Rotação (SÓ FUNCIONA EM HTTPS)
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape').catch(e => console.log("Giro bloqueado: Use HTTPS"));
                }
            } catch (e) {}

            document.getElementById('vTitle').innerText = "Assistindo Agora";
            document.body.removeEventListener('click', init);
            resetTimer();
        }, {once: false});

        // 2. SISTEMA DE ZOOM
        function changeZoom() {
            zoomLevel = (zoomLevel + 1) % 3;
            const icon = document.getElementById('zIcon');
            
            if (zoomLevel === 0) {
                video.style.objectFit = 'contain';
                video.style.transform = 'scale(1)';
                icon.className = 'fas fa-expand';
            } else if (zoomLevel === 1) {
                video.style.objectFit = 'cover';
                video.style.transform = 'scale(1)';
                icon.className = 'fas fa-compress';
            } else {
                video.style.objectFit = 'cover';
                video.style.transform = 'scale(1.25)';
                icon.className = 'fas fa-search-plus';
            }
        }

        // 3. MOSTRAR / ESCONDER INTERFACE (Toque Inteligente)
        container.addEventListener('click', (e) => {
            if (isLocked) return;
            // Se clicar nos controles, não faz nada (deixa os botões funcionarem)
            if (e.target !== controls && e.target !== container && e.target !== video) return;

            if (controls.classList.contains('hidden')) {
                controls.classList.remove('hidden');
                resetTimer();
            } else {
                controls.classList.add('hidden');
            }
        });

        function resetTimer() {
            clearTimeout(hideTimeout);
            if (!video.paused) {
                hideTimeout = setTimeout(() => {
                    controls.classList.add('hidden');
                }, 5000);
            }
        }

        // 4. CONTROLES BÁSICOS
        function togglePlay() {
            if (video.paused) {
                video.play();
                playIcon.className = 'fas fa-pause';
            } else {
                video.pause();
                playIcon.className = 'fas fa-play';
            }
            resetTimer();
        }

        function seek(s) {
            video.currentTime += s;
            resetTimer();
        }

        video.addEventListener('waiting', () => { loader.style.display = 'block'; playIcon.style.opacity = '0'; });
        video.addEventListener('playing', () => { loader.style.display = 'none'; playIcon.style.opacity = '1'; });

        // Atualizar Barra
        video.addEventListener('timeupdate', () => {
            const p = (video.currentTime / video.duration) * 100;
            progressBar.value = p;
            document.getElementById('curTime').innerText = formatTime(video.currentTime);
            document.getElementById('durTime').innerText = formatTime(video.duration);
        });

        progressBar.addEventListener('input', () => {
            video.currentTime = (progressBar.value / 100) * video.duration;
        });

        function formatTime(s) {
            let m = Math.floor(s / 60);
            let sec = Math.floor(s % 60);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        // 5. VELOCIDADE FUNCIONAL
        function setSpeed(v, el) {
            video.playbackRate = v;
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            toggleMenu(false);
        }

        function toggleMenu(s) {
            document.getElementById('mOverlay').style.display = s ? 'flex' : 'none';
        }

        // 6. CADEADO
        function setLock(s) {
            isLocked = s;
            document.getElementById('lScreen').classList.toggle('active', s);
            controls.classList.add('hidden');
        }

        function showUnlockBtn() {
            const btn = document.getElementById('uBtn');
            btn.style.opacity = '1';
            setTimeout(() => btn.style.opacity = '0', 3000);
        }

        // 7. VOLUME E BRILHO (Swipe)
        let startY;
        let isRight;
        container.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
            isRight = e.touches[0].clientX > window.innerWidth / 2;
        });

        container.addEventListener('touchmove', e => {
            if (isLocked) return;
            let delta = startY - e.touches[0].clientY;
            let indicator = document.getElementById('gIndicator');
            indicator.style.display = 'flex';
            
            if (isRight) {
                video.volume = Math.min(1, Math.max(0, video.volume + delta/5000));
                document.getElementById('gText').innerText = "Vol: " + Math.round(video.volume*100) + "%";
            } else {
                let b = document.getElementById('bOverlay');
                let curB = parseFloat(b.style.background.replace(/[^\d.]/g, '')) || 0;
                let newB = Math.min(0.8, Math.max(0, curB - delta/5000));
                b.style.background = `rgba(0,0,0,${newB})`;
                document.getElementById('gText').innerText = "Brilho: " + Math.round((1-newB)*100) + "%";
            }
        });

        container.addEventListener('touchend', () => {
            setTimeout(() => document.getElementById('gIndicator').style.display = 'none', 1000);
        });

        // Pega o vídeo da URL se existir
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('video')) video.src = urlParams.get('video');
    </script>
</body>
</html>
